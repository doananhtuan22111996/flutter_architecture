    - flutter pub get
    - flutter packages pub run build_runner build
  script:
    - cd ios
    - echo -n ${EXPORT_OPTIONS} | base64 -d > ExportOptions.plist
    - cd ..
    - build_name="$(cut -d'/' -f2 <<<"$CI_COMMIT_TAG")"
    - echo $build_name
    - build_number="$(cut -d'/' -f3 <<<"$CI_COMMIT_TAG")"
    - echo $build_number
    - flutter build ipa --release --flavor dev --export-options-plist='ios/ExportOptions.plist' --build-name $build_name --build-number $build_number
    # - xcrun altool --upload-app -f build/ios/ipa/flutter_skeleton.ipa --type ios -u product.mobile@geekup.vn -p byeo-nquz-nljn-pgwr
  artifacts:
    paths:
      - build/ios/ipa/flutter_skeleton.ipa
  after_script:
    - echo "Execute ios assembleDevRelease completed!!!"
  only:
    variables:
      - $CI_COMMIT_TAG =~ /^dev\/\d+.\d+.\d+\/\d+/

