# If you are interested in using Android with FastLane for publishing take a look at the Android-Fastlane template.

stages:
  - sonarqube
  - apk-dev
  - apk-prod
  - ipa-dev
  - ipa-prod
  - dev-apk-distribute
  - dev-ipa-distribute
  - prod-apk-distribute
  - prod-ipa-distribute

# Make Android Project
apkDev:
  variables:
    ANDROID_KEYSTORE: $ANDROID_KEYSTORE_DEV
  interruptible: true
  stage: apk-dev
  tags:
    - sflutter-shell
  before_script:
    - flutter pub get
    - flutter packages pub run build_runner build
  script:
    - cd android
    - echo -n ${ANDROID_KEYSTORE} | base64 -d > skeleton-keystore-dev.jks
    - cd ..
    - flutter build apk --release --flavor dev --no-shrink
  artifacts:
    paths:
      - build/app/outputs/flutter-apk/app-dev-release.apk
  after_script:
    - echo "Execute android assembleDevRelease completed!!!"
  only:
    - merge_request
    - main

# Make Android Project
apkProd:
  variables:
    ANDROID_KEYSTORE: $ANDROID_KEYSTORE_PROD
  interruptible: true
  stage: apk-prod
  tags:
    - sflutter-shell
  before_script:
    - flutter pub get
    - flutter packages pub run build_runner build
  script:
    - cd android
    - echo -n ${ANDROID_KEYSTORE} | base64 -d > skeleton-keystore-prod.jks
    - cd ..
    - flutter build apk --release --flavor prod --no-shrink
  artifacts:
    paths:
      - build/app/outputs/flutter-apk/app-prod-release.apk
  after_script:
    - echo "Execute android assembleDevRelease completed!!!"
  only:
    - merge_request
    - main

# Make IOS Project
ipaDev:
  variables:
    EXPORT_OPTIONS: $EXPORT_OPTIONS_DEV
  interruptible: true
  stage: ipa-dev
  tags:
    - sflutter-shell
  before_script:
    - flutter pub get
    - flutter packages pub run build_runner build
  script:
    - cd ios
    - echo -n ${EXPORT_OPTIONS} | base64 -d > ExportOptions.plist
    - cd ..
    - flutter build ipa --release --flavor dev --export-options-plist='ios/ExportOptions.plist'
  artifacts:
    paths:
      - build/ios/ipa/flutter_skeleton.ipa
  after_script:
    - echo "Execute ios assembleDevRelease completed!!!"
  only:
    - merge_request
    - main

# Make IOS Project
ipaProd:
  variables:
    EXPORT_OPTIONS: $EXPORT_OPTIONS_PROD
  interruptible: true
  stage: ipa-prod
  tags:
    - sflutter-shell
  before_script:
    - flutter pub get
    - flutter packages pub run build_runner build
  script:
    - cd ios
    - echo -n ${EXPORT_OPTIONS} | base64 -d > ExportOptions.plist
    - cd ..
    - flutter build ipa --release --flavor prod --export-options-plist='ios/ExportOptions.plist'
  artifacts:
    paths:
      - build/ios/ipa/flutter_skeleton.ipa
  after_script:
    - echo "Execute ios assembleProdRelease completed!!!"
  only:
    - merge_request
    - main

# Sonarqube
sonarqubeRelease:
  stage: sonarqube
  tags:
    - sflutter-shell
  script:
    - sonar-scanner
  after_script:
    - echo "Execute sonarqubeRelease completed!!!"
  only:
    - merge_request
    - main

# Distribution
dev-apk-distribute:
  interruptible: true
  variables:
    ANDROID_KEYSTORE: $ANDROID_KEYSTORE_DEV
    FIREBASE_CLI: $FIREBASE_CLI
  stage: dev-apk-distribute
  tags:
    - sflutter-shell
  before_script:
    - flutter pub get
    - flutter packages pub run build_runner build
  script:
    - cd android
    - echo -n ${ANDROID_KEYSTORE} | base64 -d > skeleton-keystore-dev.jks
    - cd ..
    - build_name="$(cut -d'/' -f2 <<<"$CI_COMMIT_TAG")"
    - echo $build_name
    - build_number="$(cut -d'/' -f3 <<<"$CI_COMMIT_TAG")"
    - echo $build_number
    - flutter build apk --release --flavor dev --no-shrink --build-name $build_name --build-number $build_number
    # - firebase appdistribution:distribute build/app/outputs/flutter-apk/app-dev-release.apk --app ${FIREBASE_CLI} --groups "gitlab-cicd, gu-thannong"
  artifacts:
    paths:
      - build/app/outputs/flutter-apk/app-dev-release.apk
  after_script:
    - echo "Execute android assembleDevRelease completed!!!"
  only:
    variables:
      - $CI_COMMIT_TAG =~ /^dev\/\d+.\d+.\d+\/\d+/

dev-ipa-distribute:
  interruptible: true
  stage: dev-ipa-distribute
  variables:
    EXPORT_OPTIONS: $EXPORT_OPTIONS_DEV
  tags:
    - sflutter-shell
